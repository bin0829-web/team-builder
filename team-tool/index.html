<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>建立房間｜組隊小工具</title>
  <style>
    body {
      font-family: Arial;
      background: #f3f4f6;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .box {
      background: white;
      padding: 30px;
      border-radius: 12px;
      width: 320px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }
    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }
    button {
      margin-top: 15px;
      width: 100%;
      padding: 10px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>建立房間</h2>
  <input id="slug" placeholder="房間網址 (例如 abc123)" />
  <button onclick="createRoom()">建立</button>
</div>

<script type="module">
  const BASE = "/team-builder";

  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
  import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "你的APIKEY",
    authDomain: "你的.firebaseapp.com",
    projectId: "你的ID"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.createRoom = async function () {
    const slug = document.getElementById("slug").value.trim();

    if (!slug) {
      alert("請輸入房間網址");
      return;
    }

    await setDoc(doc(db, "rooms", slug), {
      created: new Date().toISOString()
    });

    window.location.href = `${BASE}/room/?id=${slug}`;
  };
</script>

</body>
</html>
