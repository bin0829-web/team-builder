<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>組隊小工具｜房間</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", "Microsoft JhengHei", sans-serif;
      background:
        radial-gradient(circle at top left, #f8fbff 0%, #f3f6fb 35%, #edf2f8 100%);
      color: #1f2937;
    }

    .wrap {
      max-width: 1440px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 30px;
    }

    .sub {
      color: #6b7280;
      margin-bottom: 18px;
    }

    .topbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,0.92);
      border: 1px solid #dbe3ef;
      border-radius: 18px;
      padding: 14px 16px;
      margin-bottom: 18px;
      box-shadow:
        0 10px 24px rgba(15, 23, 42, 0.06),
        inset 0 1px 0 rgba(255,255,255,0.9);
      backdrop-filter: blur(6px);
    }

    .status-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .mode-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 700;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.8);
    }

    .readonly {
      background: #dbeafe;
      color: #1d4ed8;
    }

    .editable {
      background: #dcfce7;
      color: #15803d;
    }

    .layout {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 20px;
    }

    .right-col {
      display: grid;
      gap: 20px;
    }

    .card {
      background: rgba(255,255,255,0.94);
      border: 1px solid #dbe3ef;
      border-radius: 20px;
      box-shadow:
        0 10px 24px rgba(15, 23, 42, 0.06),
        inset 0 1px 0 rgba(255,255,255,0.95);
      padding: 20px;
      backdrop-filter: blur(6px);
    }

    .card-title {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 16px;
      letter-spacing: 0.2px;
    }

    .section-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 14px;
    }

    .small {
      font-size: 14px;
      color: #6b7280;
    }

    .muted {
      color: #6b7280;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    input, select, textarea, button {
      font: inherit;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      padding: 10px 12px;
      background: #fff;
      transition: 0.18s ease;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #7ea4ff;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.08);
    }

    textarea {
      min-height: 84px;
      resize: vertical;
    }

    input:disabled, select:disabled, textarea:disabled {
      background: #f8fafc;
      color: #94a3b8;
      cursor: not-allowed;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 10px 14px;
      cursor: pointer;
      transition: 0.18s ease;
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.08);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    .btn-primary {
      background: linear-gradient(180deg, #3b82f6 0%, #2563eb 100%);
      color: #fff;
      box-shadow:
        0 8px 18px rgba(37, 99, 235, 0.18),
        inset 0 1px 0 rgba(255,255,255,0.2);
    }

    .btn-secondary {
      background: linear-gradient(180deg, #f3f4f6 0%, #e5e7eb 100%);
      color: #111827;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.8);
    }

    .btn-danger {
      background: linear-gradient(180deg, #fff1f1 0%, #fee2e2 100%);
      color: #b91c1c;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.9);
    }

    .btn-outline {
      background: #fff;
      color: #111827;
      border: 1px solid #cbd5e1;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.9);
    }

    .inline-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .player-panel {
      display: grid;
      gap: 18px;
    }

    .form-card {
      border: 1px solid #dbe3ef;
      border-radius: 18px;
      padding: 16px;
      background:
        linear-gradient(180deg, #fafdff 0%, #f4f8fe 100%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.95),
        0 6px 18px rgba(148, 163, 184, 0.08);
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 12px;
    }

    .form-grid-note {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-bottom: 14px;
    }

    .list-toolbar {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 12px;
      margin-bottom: 14px;
      align-items: end;
    }

    .player-list,
    .team-members {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .constraint-list {
      display: grid;
      gap: 12px;
    }

    .player-item,
    .member-item {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 10px;
      border: 1px solid #dbe3ef;
      border-radius: 16px;
      padding: 12px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.98) 0%, rgba(248,250,252,0.96) 100%);
      min-height: 162px;
      box-shadow:
        0 10px 18px rgba(15, 23, 42, 0.05),
        0 2px 6px rgba(15, 23, 42, 0.04),
        inset 0 1px 0 rgba(255,255,255,0.95);
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
      overflow: hidden;
    }

    .player-item::before,
    .member-item::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 4px;
      background: linear-gradient(90deg, #60a5fa 0%, #a78bfa 100%);
      opacity: 0.85;
    }

    .player-item:hover,
    .member-item:hover {
      transform: translateY(-2px);
      box-shadow:
        0 16px 28px rgba(15, 23, 42, 0.08),
        0 4px 10px rgba(15, 23, 42, 0.05),
        inset 0 1px 0 rgba(255,255,255,0.95);
      border-color: #c8d8ee;
    }

    .player-item.assigned {
      background:
        linear-gradient(180deg, #f8fbff 0%, #f3f7fc 100%);
      border-color: #d7e3f8;
    }

    .player-item.draggable {
      cursor: grab;
    }

    .player-item.draggable:active,
    .member-item:active {
      cursor: grabbing;
    }

    .player-main {
      min-width: 0;
      flex: 1;
    }

    .player-top {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 6px;
    }

    .player-name {
      font-weight: 800;
      font-size: 18px;
      line-height: 1.2;
      color: #111827;
    }

    .job-badge {
      display: inline-flex;
      align-items: center;
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 999px;
      background: linear-gradient(180deg, #eef4ff 0%, #e0ebff 100%);
      color: #1d4ed8;
      font-weight: 700;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.85);
    }

    .meta {
      font-size: 13px;
      color: #64748b;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 6px;
    }

    .note-box {
      font-size: 13px;
      color: #475569;
      background: linear-gradient(180deg, #fbfdff 0%, #f8fafc 100%);
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 8px 10px;
      line-height: 1.5;
      white-space: normal;
      word-break: break-word;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.95);
    }

    .note-empty {
      font-size: 13px;
      color: #94a3b8;
      line-height: 1.5;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: auto;
    }

    .actions button {
      padding: 8px 10px;
      font-size: 14px;
      border-radius: 10px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 999px;
      background: linear-gradient(180deg, #eff6ff 0%, #e3eeff 100%);
      color: #1d4ed8;
      font-weight: 700;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.9);
    }

    .team-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .team-drop {
      min-height: 180px;
      border: 2px dashed #cbd5e1;
      border-radius: 16px;
      padding: 12px;
      background:
        linear-gradient(180deg, #fcfdff 0%, #f8fafc 100%);
      margin-bottom: 16px;
      transition: 0.18s ease;
    }

    .team-drop.drag-over {
      border-color: #2563eb;
      background: linear-gradient(180deg, #eff6ff 0%, #f4f8ff 100%);
      box-shadow: inset 0 0 0 1px rgba(37, 99, 235, 0.08);
    }

    .empty {
      height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #6b7280;
      text-align: center;
      padding: 12px;
      line-height: 1.8;
    }

    .constraint-row {
      display: grid;
      grid-template-columns: 1fr 100px 80px;
      gap: 8px;
      align-items: center;
    }

    .warn {
      margin-top: 14px;
      background: linear-gradient(180deg, #fff8ef 0%, #fff3e6 100%);
      border: 1px solid #fdba74;
      color: #9a3412;
      border-radius: 14px;
      padding: 12px;
      font-size: 14px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.7);
    }

    .info-box {
      margin-top: 20px;
      color: #475569;
      font-size: 14px;
      background: rgba(255,255,255,0.92);
      border: 1px solid #dbe3ef;
      border-radius: 16px;
      padding: 14px 16px;
      line-height: 1.7;
      box-shadow:
        0 10px 24px rgba(15, 23, 42, 0.05),
        inset 0 1px 0 rgba(255,255,255,0.95);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.45);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 16px;
      backdrop-filter: blur(4px);
    }

    .modal-backdrop.show {
      display: flex;
    }

    .modal {
      width: min(460px, 100%);
      background: rgba(255,255,255,0.96);
      border: 1px solid #dbe3ef;
      border-radius: 20px;
      box-shadow:
        0 24px 48px rgba(15, 23, 42, 0.18),
        inset 0 1px 0 rgba(255,255,255,0.95);
      padding: 22px;
      backdrop-filter: blur(10px);
    }

    .modal-title {
      font-size: 22px;
      font-weight: 800;
      margin: 0 0 8px;
    }

    .modal-desc {
      color: #64748b;
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 14px;
    }

    .modal-grid {
      display: grid;
      gap: 12px;
    }

    .modal-error {
      margin-top: 10px;
      font-size: 14px;
      color: #b91c1c;
      display: none;
    }

    .modal-error.show {
      display: block;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    @media (max-width: 1280px) {
      .player-list,
      .team-members {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 1024px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 720px) {
      .wrap {
        padding: 16px;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }

      .list-toolbar {
        grid-template-columns: 1fr;
      }

      .constraint-row {
        grid-template-columns: 1fr 90px 64px;
      }

      .player-list,
      .team-members {
        grid-template-columns: 1fr;
      }

      .player-item,
      .member-item {
        min-height: auto;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1 id="pageTitle">組隊小工具</h1>
    <div class="sub">有連結即可看，點選上方「進入編輯模式」並輸入密碼後才能修改。</div>

    <div class="topbar">
      <div class="status-row">
        <div id="modeBadge" class="mode-badge readonly">🔵 唯讀模式</div>
        <div class="small" id="roomIdText">房間 ID：讀取中...</div>
      </div>
      <div class="inline-actions">
        <button class="btn-outline" id="copyLinkBtn">複製分享連結</button>
        <button class="btn-outline" id="backCreateBtn">建立新房間</button>
        <button class="btn-outline" id="cloneRoomBtn">保留人物另開房間</button>
        <button class="btn-secondary" id="unlockBtn">進入編輯模式</button>
        <button class="btn-secondary" id="lockBtn" style="display:none;">鎖定</button>
      </div>
    </div>

    <div class="layout">
      <div class="card">
        <div class="card-title">人物資料庫</div>

        <div class="player-panel">
          <div class="form-card">
            <div class="section-title">新增人物</div>

            <div class="form-grid">
              <div>
                <label for="name">名稱</label>
                <input id="name" type="text" placeholder="例如：彬的黑騎" />
              </div>
              <div>
                <label for="level">等級</label>
                <input id="level" type="number" placeholder="200" />
              </div>
              <div>
                <label for="job">職業</label>
                <select id="job"></select>
              </div>
            </div>

            <div class="form-grid-note">
              <div>
                <label for="note">備註（非必填）</label>
                <textarea id="note" placeholder="可填寫裝備、分工、角色補充資訊"></textarea>
              </div>
            </div>

            <div class="inline-actions">
              <button class="btn-primary" id="savePlayerBtn">新增人物</button>
              <button class="btn-secondary" id="cancelEditBtn" style="display:none;">取消編輯</button>
            </div>
          </div>

          <div>
            <div class="list-toolbar">
              <div>
                <label for="jobFilter">篩選職業</label>
                <select id="jobFilter"></select>
              </div>
              <div class="small muted" style="align-self:end;">人物請直接拖拉到右側隊伍，不再提供快捷加入按鈕。</div>
            </div>

            <div class="player-list" id="playerList"></div>
          </div>
        </div>
      </div>

      <div class="right-col">
        <div class="card" id="teamA"></div>
        <div class="card" id="teamB"></div>
      </div>
    </div>

    <div class="info-box">
      第一次從分享連結打開時，預設為唯讀。<br>
      人物可直接拖拉到右側隊伍。<br>
      隊伍中的人物可雙擊快速編輯。<br>
      如果你是房主，請妥善保管編輯密碼。
    </div>
  </div>

  <div class="modal-backdrop" id="passwordModal">
    <div class="modal">
      <div class="modal-title">輸入編輯密碼</div>
      <div class="modal-desc">驗證成功後，才能新增、修改、刪除、拖拉與變更限制。</div>
      <input id="modalPasswordInput" type="password" placeholder="請輸入編輯密碼" />
      <div class="modal-error" id="modalError">密碼錯誤</div>
      <div class="modal-actions">
        <button class="btn-outline" id="modalCancelBtn">取消</button>
        <button class="btn-primary" id="modalConfirmBtn">進入編輯模式</button>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="cloneRoomModal">
    <div class="modal">
      <div class="modal-title">保留人物資料庫另開新房間</div>
      <div class="modal-desc">
        會複製目前的人物資料庫。<br>
        新房間的隊伍會清空，限制會回到預設。
      </div>

      <div class="modal-grid">
        <div>
          <label for="cloneTitle">房間名稱</label>
          <input id="cloneTitle" type="text" placeholder="請輸入新房間名稱" />
        </div>
        <div>
          <label for="cloneSlug">Slug</label>
          <input id="cloneSlug" type="text" placeholder="例如：new-room-001" />
        </div>
        <div>
          <label for="clonePassword">編輯密碼</label>
          <input id="clonePassword" type="password" placeholder="請輸入新房間密碼" />
        </div>
      </div>

      <div class="modal-error" id="cloneModalError">建立失敗</div>

      <div class="modal-actions">
        <button class="btn-outline" id="cloneCancelBtn">取消</button>
        <button class="btn-primary" id="cloneConfirmBtn">建立新房間</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import {
      getFirestore,
      doc,
      getDoc,
      setDoc,
      updateDoc,
      serverTimestamp,
      onSnapshot
    } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const BASE = "";

    const firebaseConfig = {
      apiKey: "AIzaSyAol1EZ7XzMrw2esIdc4exXVTqDwTJRetM",
      authDomain: "team-tool-3f53e.firebaseapp.com",
      projectId: "team-tool-3f53e",
      storageBucket: "team-tool-3f53e.firebasestorage.app",
      messagingSenderId: "680266181834",
      appId: "1:680266181834:web:a6509a1daa50e22319d833"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const JOB_OPTIONS = [
      "黑騎士", "主教", "箭神", "神射手", "夜使者", "暗影神偷",
      "英雄", "聖騎士", "冰雷", "火毒", "槍神", "拳霸", "其他"
    ];

    function uid() {
      return Math.random().toString(36).slice(2) + Date.now().toString(36);
    }

    const DEFAULT_CONSTRAINTS = {
      A: [{ id: uid(), job: "黑騎士", min: 1 }],
      B: []
    };

    const state = {
      roomId: "",
      data: null,
      draggingPlayerId: null,
      editingPlayerId: null,
      isEditable: false,
      unsubscribe: null,
      jobFilter: "全部"
    };

    const els = {
      pageTitle: document.getElementById("pageTitle"),
      modeBadge: document.getElementById("modeBadge"),
      roomIdText: document.getElementById("roomIdText"),
      copyLinkBtn: document.getElementById("copyLinkBtn"),
      backCreateBtn: document.getElementById("backCreateBtn"),
      cloneRoomBtn: document.getElementById("cloneRoomBtn"),
      unlockBtn: document.getElementById("unlockBtn"),
      lockBtn: document.getElementById("lockBtn"),

      name: document.getElementById("name"),
      level: document.getElementById("level"),
      job: document.getElementById("job"),
      note: document.getElementById("note"),
      jobFilter: document.getElementById("jobFilter"),
      savePlayerBtn: document.getElementById("savePlayerBtn"),
      cancelEditBtn: document.getElementById("cancelEditBtn"),
      playerList: document.getElementById("playerList"),
      teamA: document.getElementById("teamA"),
      teamB: document.getElementById("teamB"),

      passwordModal: document.getElementById("passwordModal"),
      modalPasswordInput: document.getElementById("modalPasswordInput"),
      modalError: document.getElementById("modalError"),
      modalCancelBtn: document.getElementById("modalCancelBtn"),
      modalConfirmBtn: document.getElementById("modalConfirmBtn"),

      cloneRoomModal: document.getElementById("cloneRoomModal"),
      cloneTitle: document.getElementById("cloneTitle"),
      cloneSlug: document.getElementById("cloneSlug"),
      clonePassword: document.getElementById("clonePassword"),
      cloneModalError: document.getElementById("cloneModalError"),
      cloneCancelBtn: document.getElementById("cloneCancelBtn"),
      cloneConfirmBtn: document.getElementById("cloneConfirmBtn")
    };

    bootstrap().catch((err) => {
      console.error(err);
      alert("初始化失敗，請確認網址與 Firebase 設定是否正確。");
    });

    async function bootstrap() {
      initJobOptions();
      bindEvents();
      await prepareRoom();
      subscribeRoom();
      updateModeUI();
    }

    function initJobOptions() {
      els.job.innerHTML = "";
      JOB_OPTIONS.forEach(job => {
        const option = document.createElement("option");
        option.value = job;
        option.textContent = job;
        els.job.appendChild(option);
      });

      els.jobFilter.innerHTML = "";
      const allOption = document.createElement("option");
      allOption.value = "全部";
      allOption.textContent = "全部職業";
      els.jobFilter.appendChild(allOption);

      JOB_OPTIONS.forEach(job => {
        const option = document.createElement("option");
        option.value = job;
        option.textContent = job;
        els.jobFilter.appendChild(option);
      });
    }

    function bindEvents() {
      els.copyLinkBtn.addEventListener("click", copyShareLink);
      els.backCreateBtn.addEventListener("click", () => {
        window.location.href = `${BASE}/team-tool/`;
      });
      els.cloneRoomBtn.addEventListener("click", openCloneRoomModal);
      els.unlockBtn.addEventListener("click", openPasswordModal);
      els.lockBtn.addEventListener("click", lockEditing);
      els.savePlayerBtn.addEventListener("click", savePlayer);
      els.cancelEditBtn.addEventListener("click", cancelEdit);
      els.jobFilter.addEventListener("change", () => {
        state.jobFilter = els.jobFilter.value;
        renderPlayers();
      });

      els.modalCancelBtn.addEventListener("click", closePasswordModal);
      els.modalConfirmBtn.addEventListener("click", verifyPasswordFromModal);
      els.passwordModal.addEventListener("click", (e) => {
        if (e.target === els.passwordModal) closePasswordModal();
      });
      els.modalPasswordInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") verifyPasswordFromModal();
      });

      els.cloneCancelBtn.addEventListener("click", closeCloneRoomModal);
      els.cloneConfirmBtn.addEventListener("click", createClonedRoom);
      els.cloneRoomModal.addEventListener("click", (e) => {
        if (e.target === els.cloneRoomModal) closeCloneRoomModal();
      });
      els.clonePassword.addEventListener("keydown", (e) => {
        if (e.key === "Enter") createClonedRoom();
      });
    }

    async function prepareRoom() {
      const url = new URL(window.location.href);
      const roomId = url.searchParams.get("id");

      if (!roomId) {
        alert("缺少房間 id，將返回建立房間頁面。");
        window.location.href = `${BASE}/team-tool/`;
        return;
      }

      state.roomId = roomId;
      els.roomIdText.textContent = "房間 ID：" + roomId;

      const snap = await getDoc(getRoomRef());
      if (!snap.exists()) {
        alert("找不到這個房間，將返回建立房間頁面。");
        window.location.href = `${BASE}/team-tool/`;
        return;
      }
    }

    function subscribeRoom() {
      if (state.unsubscribe) state.unsubscribe();

      state.unsubscribe = onSnapshot(getRoomRef(), (snap) => {
        if (!snap.exists()) return;
        state.data = normalizeData(snap.data());
        els.pageTitle.textContent = state.data.title || "組隊小工具";
        renderAll();
      });
    }

    function normalizeData(raw) {
      return {
        title: raw.title || "組隊小工具",
        slug: raw.slug || state.roomId,
        players: Array.isArray(raw.players)
          ? raw.players.map(player => ({
              id: player.id || uid(),
              name: player.name || "",
              level: Number(player.level || 0),
              job: player.job || "其他",
              note: player.note || ""
            }))
          : [],
        teams: {
          A: {
            members: Array.isArray(raw?.teams?.A?.members) ? raw.teams.A.members : [],
            constraints: Array.isArray(raw?.teams?.A?.constraints)
              ? raw.teams.A.constraints
              : structuredClone(DEFAULT_CONSTRAINTS.A)
          },
          B: {
            members: Array.isArray(raw?.teams?.B?.members) ? raw.teams.B.members : [],
            constraints: Array.isArray(raw?.teams?.B?.constraints)
              ? raw.teams.B.constraints
              : structuredClone(DEFAULT_CONSTRAINTS.B)
          }
        },
        passwordHash: raw.passwordHash || "",
        createdAt: raw.createdAt || null,
        updatedAt: raw.updatedAt || null
      };
    }

    function getRoomRef(id = state.roomId) {
      return doc(db, "horntailRooms", id);
    }

    async function patchRoom(patch) {
      await updateDoc(getRoomRef(), {
        ...patch,
        updatedAt: serverTimestamp()
      });
    }

    function updateModeUI() {
      if (state.isEditable) {
        els.modeBadge.className = "mode-badge editable";
        els.modeBadge.textContent = "🟢 編輯模式";
        els.unlockBtn.style.display = "none";
        els.lockBtn.style.display = "inline-block";
      } else {
        els.modeBadge.className = "mode-badge readonly";
        els.modeBadge.textContent = "🔵 唯讀模式";
        els.unlockBtn.style.display = "inline-block";
        els.lockBtn.style.display = "none";
      }

      const disabled = !state.isEditable;
      els.name.disabled = disabled;
      els.level.disabled = disabled;
      els.job.disabled = disabled;
      els.note.disabled = disabled;
      els.savePlayerBtn.disabled = disabled;
      els.cancelEditBtn.disabled = disabled;
      els.cloneRoomBtn.disabled = disabled;
    }

    function getShareUrl() {
      return `${window.location.origin}${BASE}/room/?id=${encodeURIComponent(state.roomId)}`;
    }

    function copyShareLink() {
      const shareUrl = getShareUrl();
      navigator.clipboard.writeText(shareUrl)
        .then(() => alert("已複製分享連結"))
        .catch(() => alert("複製失敗，請手動複製網址"));
    }

    function openPasswordModal() {
      els.modalPasswordInput.value = "";
      els.modalError.textContent = "密碼錯誤";
      els.modalError.classList.remove("show");
      els.passwordModal.classList.add("show");
      setTimeout(() => els.modalPasswordInput.focus(), 30);
    }

    function closePasswordModal() {
      els.passwordModal.classList.remove("show");
      els.modalPasswordInput.value = "";
      els.modalError.classList.remove("show");
    }

    async function verifyPasswordFromModal() {
      const pwd = els.modalPasswordInput.value.trim();
      if (!pwd) {
        els.modalError.textContent = "請輸入密碼";
        els.modalError.classList.add("show");
        return;
      }

      const inputHash = await sha256(pwd);
      const currentHash = state.data.passwordHash || "";

      if (!currentHash) {
        els.modalError.textContent = "此房間尚未設定密碼";
        els.modalError.classList.add("show");
        return;
      }

      if (inputHash !== currentHash) {
        els.modalError.textContent = "密碼錯誤";
        els.modalError.classList.add("show");
        return;
      }

      state.isEditable = true;
      updateModeUI();
      renderAll();
      closePasswordModal();
      alert("已進入編輯模式");
    }

    function lockEditing() {
      state.isEditable = false;
      resetForm();
      closePasswordModal();
      closeCloneRoomModal();
      updateModeUI();
      renderAll();
    }

    function requireEditable() {
      if (!state.isEditable) {
        alert("目前是唯讀模式，請先點上方「進入編輯模式」並輸入密碼。");
        return false;
      }
      return true;
    }

    function getAssignedTeam(playerId) {
      if (state.data.teams.A.members.includes(playerId)) return "A";
      if (state.data.teams.B.members.includes(playerId)) return "B";
      return null;
    }

    function getPlayer(playerId) {
      return state.data.players.find(p => p.id === playerId);
    }

    function resetForm() {
      state.editingPlayerId = null;
      els.name.value = "";
      els.level.value = "";
      els.note.value = "";
      els.job.value = JOB_OPTIONS[0];
      els.savePlayerBtn.textContent = "新增人物";
      els.cancelEditBtn.style.display = "none";
    }

    function cancelEdit() {
      resetForm();
      renderAll();
    }

    function fillEditForm(playerId) {
      const player = getPlayer(playerId);
      if (!player) return;

      state.editingPlayerId = playerId;
      els.name.value = player.name;
      els.level.value = player.level;
      els.job.value = player.job;
      els.note.value = player.note || "";
      els.savePlayerBtn.textContent = "儲存修改";
      els.cancelEditBtn.style.display = "inline-block";
      els.name.focus();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    async function savePlayer() {
      if (!requireEditable()) return;

      const name = els.name.value.trim();
      const level = Number(els.level.value);
      const job = els.job.value;
      const note = els.note.value.trim();

      if (!name) return alert("請輸入人物名稱");
      if (!level || level < 1) return alert("請輸入正確等級");
      if (!job) return alert("請選擇職業");

      const players = [...state.data.players];

      if (state.editingPlayerId) {
        const target = players.find(p => p.id === state.editingPlayerId);
        if (!target) return;
        target.name = name;
        target.level = level;
        target.job = job;
        target.note = note;
      } else {
        players.push({ id: uid(), name, level, job, note });
      }

      await patchRoom({ players });
      resetForm();
    }

    async function removePlayer(playerId) {
      if (!requireEditable()) return;

      const players = state.data.players.filter(p => p.id !== playerId);
      const teams = structuredClone(state.data.teams);
      teams.A.members = teams.A.members.filter(id => id !== playerId);
      teams.B.members = teams.B.members.filter(id => id !== playerId);

      await patchRoom({ players, teams });

      if (state.editingPlayerId === playerId) resetForm();
    }

    async function moveToTeam(playerId, teamKey) {
      if (!requireEditable()) return;

      const teams = structuredClone(state.data.teams);
      const otherKey = teamKey === "A" ? "B" : "A";

      if (teams[teamKey].members.includes(playerId)) return;
      if (teams[teamKey].members.length >= 6) {
        alert(teamKey + " 隊已滿 6 人");
        return;
      }

      teams[otherKey].members = teams[otherKey].members.filter(id => id !== playerId);
      teams[teamKey].members.push(playerId);
      await patchRoom({ teams });
    }

    async function removeFromTeam(playerId, teamKey) {
      if (!requireEditable()) return;

      const teams = structuredClone(state.data.teams);
      teams[teamKey].members = teams[teamKey].members.filter(id => id !== playerId);
      await patchRoom({ teams });
    }

    async function addConstraint(teamKey) {
      if (!requireEditable()) return;

      const teams = structuredClone(state.data.teams);
      teams[teamKey].constraints.push({ id: uid(), job: "黑騎士", min: 1 });
      await patchRoom({ teams });
    }

    async function updateConstraint(teamKey, constraintId, field, value) {
      if (!requireEditable()) return;

      const teams = structuredClone(state.data.teams);
      const target = teams[teamKey].constraints.find(c => c.id === constraintId);
      if (!target) return;
      target[field] = value;
      await patchRoom({ teams });
    }

    async function removeConstraint(teamKey, constraintId) {
      if (!requireEditable()) return;

      const teams = structuredClone(state.data.teams);
      teams[teamKey].constraints = teams[teamKey].constraints.filter(c => c.id !== constraintId);
      await patchRoom({ teams });
    }

    function getTeamStats(teamKey) {
      const members = state.data.teams[teamKey].members.map(getPlayer).filter(Boolean);
      const avgLevel = members.length
        ? Math.round(members.reduce((sum, p) => sum + Number(p.level || 0), 0) / members.length)
        : 0;

      const jobCount = {};
      members.forEach(member => {
        jobCount[member.job] = (jobCount[member.job] || 0) + 1;
      });

      const failed = state.data.teams[teamKey].constraints.filter(rule => {
        return (jobCount[rule.job] || 0) < Number(rule.min || 0);
      });

      return { members, avgLevel, failed };
    }

    function renderAll() {
      if (!state.data) return;
      updateModeUI();
      renderPlayers();
      renderTeam("A", els.teamA);
      renderTeam("B", els.teamB);
    }

    function renderPlayers() {
      els.playerList.innerHTML = "";
      const players = state.data.players.filter(player => {
        return state.jobFilter === "全部" ? true : player.job === state.jobFilter;
      });

      if (!players.length) {
        els.playerList.innerHTML = '<div class="card small">目前沒有符合篩選條件的人物資料。</div>';
        return;
      }

      players.forEach(player => {
        const assigned = getAssignedTeam(player.id);
        const item = document.createElement("div");
        item.className = "player-item" + (assigned ? " assigned" : "") + (state.isEditable ? " draggable" : "");
        item.draggable = state.isEditable;

        item.addEventListener("dragstart", () => {
          if (state.isEditable) state.draggingPlayerId = player.id;
        });

        item.addEventListener("dragend", () => {
          state.draggingPlayerId = null;
        });

        item.innerHTML = `
          <div class="player-main">
            <div class="player-top">
              <div class="player-name">${escapeHtml(player.name)}</div>
              <span class="job-badge">${escapeHtml(player.job)}</span>
              <span class="tag">${assigned ? "已編入 " + assigned + " 隊" : "可拖拉加入隊伍"}</span>
            </div>

            <div class="meta">
              <span>Lv.${player.level}</span>
            </div>

            ${player.note
              ? `<div class="note-box">${escapeHtml(player.note)}</div>`
              : `<div class="note-empty">尚未填寫備註</div>`}
          </div>

          <div class="actions">
            <button class="btn-secondary" data-edit ${!state.isEditable ? "disabled" : ""}>修改</button>
            <button class="btn-danger" data-delete ${!state.isEditable ? "disabled" : ""}>刪除</button>
          </div>
        `;

        item.querySelector("[data-edit]").addEventListener("click", () => fillEditForm(player.id));
        item.querySelector("[data-delete]").addEventListener("click", () => removePlayer(player.id));

        els.playerList.appendChild(item);
      });
    }

    function renderTeam(teamKey, root) {
      const { members, avgLevel, failed } = getTeamStats(teamKey);
      const isEditable = state.isEditable;

      root.innerHTML = `
        <div class="team-head">
          <div>
            <div class="card-title" style="margin-bottom:6px;">${teamKey} 隊伍</div>
            <div class="small">平均等級：${avgLevel}</div>
          </div>
          <span class="tag">${members.length}/6 人</span>
        </div>

        <div class="team-drop" id="drop-${teamKey}">
          ${members.length === 0
            ? '<div class="empty">把左側人物拖拉到這裡<br>即可加入隊伍</div>'
            : '<div class="team-members"></div>'}
        </div>

        <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px;">
          <div class="card-title" style="font-size:18px;margin:0;">隊伍職業限制</div>
          <button class="btn-secondary" id="add-rule-${teamKey}" ${!isEditable ? "disabled" : ""}>新增限制</button>
        </div>

        <div class="constraint-list" id="rules-${teamKey}"></div>
        ${failed.length ? '<div class="warn" id="warn-' + teamKey + '"></div>' : ""}
      `;

      const drop = root.querySelector(`#drop-${teamKey}`);

      if (isEditable) {
        drop.addEventListener("dragover", e => {
          e.preventDefault();
          drop.classList.add("drag-over");
        });

        drop.addEventListener("dragleave", () => {
          drop.classList.remove("drag-over");
        });

        drop.addEventListener("drop", e => {
          e.preventDefault();
          drop.classList.remove("drag-over");
          if (state.draggingPlayerId) moveToTeam(state.draggingPlayerId, teamKey);
          state.draggingPlayerId = null;
        });
      }

      root.querySelector(`#add-rule-${teamKey}`).addEventListener("click", () => addConstraint(teamKey));

      if (members.length > 0) {
        const membersWrap = root.querySelector(".team-members");

        members.forEach(member => {
          const row = document.createElement("div");
          row.className = "member-item";
          row.title = isEditable ? "雙擊可快速編輯" : "唯讀模式";
          row.draggable = isEditable;

          if (isEditable) {
            row.addEventListener("dragstart", () => {
              state.draggingPlayerId = member.id;
            });

            row.addEventListener("dragend", () => {
              state.draggingPlayerId = null;
            });

            row.addEventListener("dblclick", () => fillEditForm(member.id));
          }

          row.innerHTML = `
            <div class="player-main">
              <div class="player-top">
                <div class="player-name">${escapeHtml(member.name)}</div>
                <span class="job-badge">${escapeHtml(member.job)}</span>
              </div>

              <div class="meta">
                <span>Lv.${member.level}</span>
              </div>

              ${member.note
                ? `<div class="note-box">${escapeHtml(member.note)}</div>`
                : `<div class="note-empty">尚未填寫備註</div>`}
            </div>

            <div class="actions">
              <button class="btn-secondary" data-edit-team ${!isEditable ? "disabled" : ""}>修改</button>
              <button class="btn-secondary" data-remove-team ${!isEditable ? "disabled" : ""}>移出</button>
            </div>
          `;

          row.querySelector("[data-edit-team]").addEventListener("click", () => fillEditForm(member.id));
          row.querySelector("[data-remove-team]").addEventListener("click", () => removeFromTeam(member.id, teamKey));

          membersWrap.appendChild(row);
        });
      }

      const rulesWrap = root.querySelector(`#rules-${teamKey}`);
      const constraints = state.data.teams[teamKey].constraints;

      if (!constraints.length) {
        rulesWrap.innerHTML = '<div class="small">尚未設定限制</div>';
      } else {
        constraints.forEach(rule => {
          const row = document.createElement("div");
          row.className = "constraint-row";

          const jobSelect = document.createElement("select");
          jobSelect.disabled = !isEditable;

          JOB_OPTIONS.forEach(job => {
            const option = document.createElement("option");
            option.value = job;
            option.textContent = job;
            if (job === rule.job) option.selected = true;
            jobSelect.appendChild(option);
          });

          jobSelect.addEventListener("change", e => {
            updateConstraint(teamKey, rule.id, "job", e.target.value);
          });

          const minInput = document.createElement("input");
          minInput.type = "number";
          minInput.min = "1";
          minInput.value = rule.min;
          minInput.disabled = !isEditable;
          minInput.addEventListener("change", e => {
            updateConstraint(teamKey, rule.id, "min", Math.max(1, Number(e.target.value || 1)));
          });

          const delBtn = document.createElement("button");
          delBtn.className = "btn-danger";
          delBtn.textContent = "刪除";
          delBtn.disabled = !isEditable;
          delBtn.addEventListener("click", () => removeConstraint(teamKey, rule.id));

          row.appendChild(jobSelect);
          row.appendChild(minInput);
          row.appendChild(delBtn);
          rulesWrap.appendChild(row);
        });
      }

      if (failed.length) {
        const warn = root.querySelector(`#warn-${teamKey}`);
        warn.innerHTML =
          "<b>目前未符合條件：</b><br>" +
          failed.map(rule => `至少需要 ${rule.min} 位 ${escapeHtml(rule.job)}`).join("<br>");
      }
    }

    function openCloneRoomModal() {
      if (!requireEditable()) return;

      els.cloneTitle.value = `${state.data.title || "組隊小工具"} - 副本`;
      els.cloneSlug.value = "";
      els.clonePassword.value = "";
      els.cloneModalError.classList.remove("show");
      els.cloneModalError.textContent = "建立失敗";
      els.cloneRoomModal.classList.add("show");
      setTimeout(() => els.cloneTitle.focus(), 30);
    }

    function closeCloneRoomModal() {
      els.cloneRoomModal.classList.remove("show");
      els.cloneModalError.classList.remove("show");
    }

    async function createClonedRoom() {
      if (!requireEditable()) return;

      const title = els.cloneTitle.value.trim();
      const slug = els.cloneSlug.value.trim();
      const password = els.clonePassword.value.trim();

      if (!title) {
        showCloneError("請輸入房間名稱");
        return;
      }

      if (!slug) {
        showCloneError("請輸入 slug");
        return;
      }

      if (!password) {
        showCloneError("請輸入密碼");
        return;
      }

      const safeSlug = slug.toLowerCase().replace(/[^a-z0-9-_]/g, "-");

      if (!safeSlug) {
        showCloneError("slug 格式不正確，請使用英數、- 或 _");
        return;
      }

      const newRoomRef = getRoomRef(safeSlug);
      const existing = await getDoc(newRoomRef);

      if (existing.exists()) {
        showCloneError("此 slug 已存在，請更換");
        return;
      }

      const passwordHash = await sha256(password);

      const clonedPlayers = state.data.players.map(player => ({
        id: uid(),
        name: player.name,
        level: player.level,
        job: player.job,
        note: player.note || ""
      }));

      await setDoc(newRoomRef, {
        title,
        slug: safeSlug,
        players: clonedPlayers,
        teams: {
          A: {
            members: [],
            constraints: [{ id: uid(), job: "黑騎士", min: 1 }]
          },
          B: {
            members: [],
            constraints: []
          }
        },
        passwordHash,
        createdAt: serverTimestamp(),
        updatedAt: serverTimestamp()
      });

      closeCloneRoomModal();
      const nextUrl = `${window.location.origin}${BASE}/room/?id=${encodeURIComponent(safeSlug)}`;
      window.open(nextUrl, "_blank");
      alert("已建立新房間，並在新分頁開啟。");
    }

    function showCloneError(message) {
      els.cloneModalError.textContent = message;
      els.cloneModalError.classList.add("show");
    }

    async function sha256(text) {
      const encoder = new TextEncoder();
      const data = encoder.encode(text);
      const hashBuffer = await crypto.subtle.digest("SHA-256", data);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, "0")).join("");
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
  </script>
</body>
</html>
