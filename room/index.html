<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>房間｜組隊小工具</title>
  <style>
    body {
      font-family: Arial;
      background: #f3f4f6;
      padding: 40px;
    }
    .box {
      background: white;
      padding: 20px;
      border-radius: 12px;
      max-width: 500px;
      margin: auto;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>

<div class="box">
  <h2 id="title">房間載入中...</h2>
  <p id="share"></p>
  <button onclick="goBack()">回首頁</button>
</div>

<script type="module">
  const BASE = "/team-builder";

  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "你的APIKEY",
    authDomain: "你的.firebaseapp.com",
    projectId: "你的ID"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  function getRoomId() {
    const url = new URL(window.location.href);
    return url.searchParams.get("id");
  }

  async function loadRoom() {
    const id = getRoomId();

    if (!id) {
      alert("沒有房間 ID");
      window.location.href = `${BASE}/team-tool/`;
      return;
    }

    const snap = await getDoc(doc(db, "rooms", id));

    if (!snap.exists()) {
      alert("房間不存在");
      window.location.href = `${BASE}/team-tool/`;
      return;
    }

    document.getElementById("title").innerText = "房間：" + id;
    document.getElementById("share").innerText =
      window.location.origin + BASE + "/room/?id=" + id;
  }

  window.goBack = function () {
    window.location.href = `${BASE}/team-tool/`;
  };

  loadRoom();
</script>

</body>
</html>
